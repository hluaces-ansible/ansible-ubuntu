---
hluaces_molecule_libvirt_state: present  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_uri: "qemu:///system"  # noqa: var-naming[no-role-prefix]

# VM defaults (overridable per-host via host_vars)
hluaces_molecule_libvirt_vm_vcpus: 2  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_vm_memory_mb: 2048  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_vm_disk_gb: 20  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_vm_arch: x86_64  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_vm_cpu_mode: host-passthrough  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_vm_os_type: hvm  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_vm_boot_dev: hd  # noqa: var-naming[no-role-prefix]

# SSH connectivity
hluaces_molecule_libvirt_vm_ssh_wait_timeout: >-  # noqa: var-naming[no-role-prefix]
  {{ lookup('env', 'MOLECULE_LIBVIRT_SSH_TIMEOUT') | default(120, true) }}
hluaces_molecule_libvirt_ssh_user: molecule  # noqa: var-naming[no-role-prefix]

# APT proxy URL injected into cloud-init (empty = no proxy)
hluaces_molecule_libvirt_apt_proxy: ''  # noqa: var-naming[no-role-prefix]

# Appended to the libvirt domain name (not to hostnames or volume names) so
# multiple runners on one libvirt host can hold the same inventory host.
hluaces_molecule_libvirt_vm_name_suffix: ''  # noqa: var-naming[no-role-prefix]

# Cloud-init packages installed on every VM
hluaces_molecule_libvirt_vm_cloudinit_packages:  # noqa: var-naming[no-role-prefix]
  - qemu-guest-agent
  - python3

# Destroy behavior
hluaces_molecule_libvirt_vm_force_destroy: true  # noqa: var-naming[no-role-prefix]

# VM group (which inventory group contains VMs to manage)
hluaces_molecule_libvirt_vm_group: all  # noqa: var-naming[no-role-prefix]

# Cross-role dependencies (set by other roles when using the playbook API,
# but must be provided if using this role standalone)
hluaces_molecule_libvirt_pool_name: molecule  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_pool_path: "/var/tmp/molecule-libvirt/{{ hluaces_molecule_libvirt_pool_name }}"  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_network_name: molecule  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_network_cidr: "192.168.123.0/24"  # noqa: var-naming[no-role-prefix]
hluaces_molecule_libvirt_vm_ip_offset: 10  # noqa: var-naming[no-role-prefix]
# These facts are normally set by libvirt_keys/libvirt_pool/libvirt_network roles.
# Base image URL and name are owned by the libvirt_pool role.
# Override hluaces_molecule_libvirt_base_image_url in inventory, not here.
# The VM role computes fallbacks if they are not defined.
# hluaces_molecule_libvirt_ssh_public_key: (set by libvirt_keys — no fallback, must be provided)
# _hluaces_molecule_libvirt_base_image_name: (set by libvirt_pool, fallback computed from URL)
# _hluaces_molecule_libvirt_network_gateway: (set by libvirt_network, fallback computed)
# _hluaces_molecule_libvirt_vm_network_info: (set by libvirt_network, fallback computed)
