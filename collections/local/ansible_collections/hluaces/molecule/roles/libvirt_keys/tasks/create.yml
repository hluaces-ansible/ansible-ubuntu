---
- name: Ensure SSH key directory exists
  ansible.builtin.file:
    path: "{{ hluaces_molecule_libvirt_ssh_key_path | dirname }}"
    state: directory
    mode: "0700"

- name: Generate ephemeral SSH keypair
  community.crypto.openssh_keypair:
    path: "{{ hluaces_molecule_libvirt_ssh_key_path }}"
    type: "{{ hluaces_molecule_libvirt_ssh_key_type }}"
    comment: "{{ hluaces_molecule_libvirt_ssh_key_comment }}"
    regenerate: never
  register: _hluaces_molecule_libvirt_ssh_keypair

- name: Read SSH public key
  ansible.builtin.slurp:
    src: "{{ hluaces_molecule_libvirt_ssh_key_path }}.pub"
  register: _hluaces_molecule_libvirt_ssh_pubkey_raw

- name: Set SSH key facts
  ansible.builtin.set_fact:
    hluaces_molecule_libvirt_ssh_public_key: >-
      {{ _hluaces_molecule_libvirt_ssh_pubkey_raw.content | b64decode | trim }}
    hluaces_molecule_libvirt_ssh_private_key_path: >-
      {{ hluaces_molecule_libvirt_ssh_key_path }}
