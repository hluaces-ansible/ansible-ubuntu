---
- name: Derive base image name from URL
  ansible.builtin.set_fact:
    _hluaces_molecule_libvirt_base_image_name: >-
      {{ hluaces_molecule_libvirt_base_image_name
         | default(hluaces_molecule_libvirt_base_image_url | basename, true) }}

- name: Create pool directory
  ansible.builtin.file:
    path: "{{ hluaces_molecule_libvirt_pool_path }}"
    state: directory
    mode: "{{ hluaces_molecule_libvirt_pool_mode }}"
  when: hluaces_molecule_libvirt_pool_type == 'dir'

- name: Check if pool is active
  community.libvirt.virt_pool:
    uri: "{{ hluaces_molecule_libvirt_uri }}"
    command: list_pools
  register: _hluaces_molecule_libvirt_active_pools

# virt_pool list_pools only returns active pools. Shell out to virsh to see
# defined-but-inactive entries so stale pools (e.g. path changed) can be
# cleaned up before redefining.
- name: List all pools (active and inactive)
  ansible.builtin.command:
    argv:
      - virsh
      - -c
      - "{{ hluaces_molecule_libvirt_uri }}"
      - pool-list
      - --all
      - --name
  register: _hluaces_molecule_libvirt_all_pools
  changed_when: false

- name: Undefine stale pool (exists but not active)
  when:
    - hluaces_molecule_libvirt_pool_name in _hluaces_molecule_libvirt_all_pools.stdout_lines
    - hluaces_molecule_libvirt_pool_name not in _hluaces_molecule_libvirt_active_pools.list_pools
  block:
    - name: Attempt to deactivate stale pool
      community.libvirt.virt_pool:
        uri: "{{ hluaces_molecule_libvirt_uri }}"
        name: "{{ hluaces_molecule_libvirt_pool_name }}"
        state: inactive
      failed_when: false

    - name: Undefine stale pool
      community.libvirt.virt_pool:
        uri: "{{ hluaces_molecule_libvirt_uri }}"
        name: "{{ hluaces_molecule_libvirt_pool_name }}"
        state: undefined
      failed_when: false

- name: Define storage pool
  community.libvirt.virt_pool:
    uri: "{{ hluaces_molecule_libvirt_uri }}"
    command: define
    name: "{{ hluaces_molecule_libvirt_pool_name }}"
    xml: "{{ lookup('template', 'pool_' + hluaces_molecule_libvirt_pool_type + '.xml.j2') }}"
  when: >-
    hluaces_molecule_libvirt_pool_name not in _hluaces_molecule_libvirt_active_pools.list_pools

- name: Activate storage pool
  community.libvirt.virt_pool:
    uri: "{{ hluaces_molecule_libvirt_uri }}"
    name: "{{ hluaces_molecule_libvirt_pool_name }}"
    state: active

- name: Set pool autostart
  community.libvirt.virt_pool:
    uri: "{{ hluaces_molecule_libvirt_uri }}"
    name: "{{ hluaces_molecule_libvirt_pool_name }}"
    autostart: "{{ hluaces_molecule_libvirt_pool_autostart }}"

- name: Download base image
  ansible.builtin.get_url:
    url: "{{ hluaces_molecule_libvirt_base_image_url }}"
    dest: "{{ hluaces_molecule_libvirt_pool_path }}/{{ _hluaces_molecule_libvirt_base_image_name }}"
    mode: "0644"
  register: _hluaces_molecule_libvirt_image_download
  retries: 2
  delay: 5
  until: _hluaces_molecule_libvirt_image_download is succeeded

# Pool activation kicks off an async refresh thread inside libvirtd. Under
# host contention that thread may still be running when the explicit refresh
# below is attempted, and libvirt returns VIR_ERR_OPERATION_INVALID
# ("asynchronous jobs running") immediately. Retry until the async job
# drains.
- name: Refresh storage pool
  community.libvirt.virt_pool:
    uri: "{{ hluaces_molecule_libvirt_uri }}"
    name: "{{ hluaces_molecule_libvirt_pool_name }}"
    command: refresh
  register: _hluaces_molecule_libvirt_pool_refresh
  retries: 15
  delay: 2
  until: _hluaces_molecule_libvirt_pool_refresh is succeeded
