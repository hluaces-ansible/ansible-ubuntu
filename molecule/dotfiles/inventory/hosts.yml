---
all:
  vars:
    hluaces_molecule_libvirt_pool_name: 'mol-dotfiles'
    hluaces_molecule_libvirt_network_name: 'mol-dotfiles'
    hluaces_molecule_libvirt_network_bridge: 'virbr-mdot'
    hluaces_molecule_libvirt_network_cidr: '192.168.121.0/24'
    ubuntu_release: 'noble'
    hluaces_molecule_libvirt_base_image_url: >-
      https://cloud-images.ubuntu.com/{{ ubuntu_release }}/current/{{ ubuntu_release }}-server-cloudimg-amd64.img
    hluaces_molecule_libvirt_vm_vcpus: 2
    hluaces_molecule_libvirt_vm_memory_mb: 2048
    hluaces_molecule_libvirt_vm_disk_gb: 20
    ansible_user: 'molecule'
    ansible_ssh_private_key_file: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY')
         | default('/var/tmp/molecule-libvirt', true) }}/ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
  children:
    ubuntu_group:
      hosts:
        dotfiles:
          ansible_host: '192.168.121.11'
