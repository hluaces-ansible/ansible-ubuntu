---
- name: 'Prepare dotfiles test VM'
  hosts: 'ubuntu_group'
  become: true
  gather_facts: false
  tasks:
    - name: 'Wait for cloud-init to finish (releases the first-boot dpkg lock)'
      ansible.builtin.command:
        cmd: 'cloud-init status --wait'
      changed_when: false
      failed_when: false
