---
- name: 'Prepare desktop test VM'
  hosts: 'ubuntu_group'
  become: true
  gather_facts: true
  tasks:
    - name: 'Update apt cache'
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: 'Install GNOME desktop packages'
      ansible.builtin.apt:
        name:
          - 'ubuntu-desktop-minimal'
          - 'gnome-shell-extensions'
          - 'dbus-x11'
        state: 'present'

    - name: 'Ensure converge user exists (so lingering can target it)'
      ansible.builtin.user:
        name: "{{ configure_system_user_name }}"
        shell: '/bin/bash'
        create_home: true

    - name: 'Resolve converge user uid'
      ansible.builtin.getent:
        database: 'passwd'
        key: "{{ configure_system_user_name }}"

    - name: 'Enable lingering (persistent user systemd instance + dbus session bus)'
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ configure_system_user_name }}"
        creates: "/var/lib/systemd/linger/{{ configure_system_user_name }}"

    - name: 'Wait for the user runtime dir to appear'
      ansible.builtin.wait_for:
        path: "/run/user/{{ ansible_facts.getent_passwd[configure_system_user_name][1] }}"
        timeout: 60
