---
- name: 'Prepare ulauncher test VM'
  hosts: 'ubuntu_group'
  become: true
  gather_facts: false
  tasks:
    - name: 'Wait for cloud-init to finish (releases the first-boot dpkg lock)'
      ansible.builtin.command:
        cmd: 'cloud-init status --wait'
      changed_when: false
      failed_when: false

    - name: 'Install add-apt-repository support (required for the ulauncher PPA)'
      ansible.builtin.apt:
        name:
          - 'software-properties-common'
        state: 'present'
        update_cache: true
        lock_timeout: 300
