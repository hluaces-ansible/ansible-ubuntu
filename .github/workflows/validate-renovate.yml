---
name: Validate Renovate Config
run-name: Validate Renovate Config for ${{ github.event_name }}:${{ github.ref }} (${{ github.sha }})

on:
  pull_request:
    paths:
      - "renovate.json"
      - ".renovaterc"
      - ".renovaterc.json"
  push:
    branches:
      - main
    paths:
      - "renovate.json"
      - ".renovaterc"
      - ".renovaterc.json"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Renovate Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install Renovate
        run: npm install -g renovate@43

      - name: Validate Renovate config
        run: renovate-config-validator
