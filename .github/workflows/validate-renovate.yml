---
name: Validate Renovate Config
run-name: Validate Renovate Config for ${{ github.event_name }}:${{ github.ref }} (${{ github.sha }})

on:
  pull_request:
    paths:
      - "renovate.json"
      - ".renovaterc"
      - ".renovaterc.json"
  push:
    branches:
      - main
    paths:
      - "renovate.json"
      - ".renovaterc"
      - ".renovaterc.json"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Renovate Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0

      - name: Install Renovate
        run: npm install -g renovate@43

      - name: Validate Renovate config
        run: renovate-config-validator
