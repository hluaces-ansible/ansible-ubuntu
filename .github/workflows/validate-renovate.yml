---
name: Validate Renovate Config
run-name: Validate Renovate Config for ${{ github.event_name }}:${{ github.ref }} (${{ github.sha }})

on:
  pull_request:
    paths:
      - "renovate.json"
      - ".renovaterc"
      - ".renovaterc.json"
  push:
    branches:
      - main
    paths:
      - "renovate.json"
      - ".renovaterc"
      - ".renovaterc.json"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Renovate Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: Install Renovate
        run: npm install -g renovate@43

      - name: Validate Renovate config
        run: renovate-config-validator
