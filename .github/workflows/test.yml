---
name: Test
run-name: Test for ${{ github.event_name }}:${{ github.ref }} (${{ github.sha }})
"on":
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Test:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        host:
          - "ubuntu24-laptop"
          - "ubuntu24-desktop"
          - "sysctl"
          - "dotfiles"
          - "dropbox"
          - "ulauncher"
    steps:
      - name: Check whether molecule-relevant files changed
        id: filter
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_FILES_URL: >-
            https://api.github.com/repos/${{ github.repository }}/pulls/${{
            github.event.pull_request.number }}/files?per_page=100
        run: |
          files=$(curl -sf --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${PR_FILES_URL}" | jq -r '.[].filename')

          relevant=$(printf '%s\n' "${files}" \
            | grep -vE '^(\.github/|README\.md$|renovate\.json$|LICENSE$|\.gitignore$)' \
            || true)

          # A 100-file page means the list may be truncated: run to be safe.
          if [ -z "${relevant}" ] && [ "$(printf '%s\n' "${files}" | wc -l)" -lt 100 ]; then
            echo "Only molecule-irrelevant files changed, skipping test steps"
            echo "run_molecule=false" >> "${GITHUB_OUTPUT}"
          else
            echo "run_molecule=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check out code
        if: steps.filter.outputs.run_molecule != 'false'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      ################
      # Bootstrapping
      ################
      - name: Set up Python
        if: steps.filter.outputs.run_molecule != 'false'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Init variables
        if: steps.filter.outputs.run_molecule != 'false'
        run: |
          # Ephemeral storage
          export MOLECULE_EPHEMERAL_DIRECTORY="${GITHUB_WORKSPACE}/.molecule_ephemeral/${{ matrix.host }}"
          echo "MOLECULE_EPHEMERAL_DIRECTORY="${MOLECULE_EPHEMERAL_DIRECTORY}"" >> $GITHUB_ENV
          mkdir -p "${MOLECULE_EPHEMERAL_DIRECTORY}"

          export DEFAULT_VAULT_PASSWORD_FILE="${MOLECULE_EPHEMERAL_DIRECTORY}/.default.vault"
          echo "DEFAULT_VAULT_PASSWORD_FILE="${DEFAULT_VAULT_PASSWORD_FILE}"" >> $GITHUB_ENV
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > "${DEFAULT_VAULT_PASSWORD_FILE}"

          # Runner slot drives the libvirt namespace; an unparseable name must fail
          # loudly, not fall back to a shared default slot.
          if [[ "${RUNNER_NAME}" =~ ^runner-([0-9]+)- ]]; then
            echo "MOLECULE_RUNNER_SLOT=${BASH_REMATCH[1]}" >> "${GITHUB_ENV}"
          else
            echo "::error::Cannot derive runner slot from RUNNER_NAME='${RUNNER_NAME}'"
            exit 1
          fi

      - name: Set up dependencies
        if: steps.filter.outputs.run_molecule != 'false'
        run: make dependencies

      - name: Set up Ansible homedir and show tools versions
        if: steps.filter.outputs.run_molecule != 'false'
        run: ansible --version && virsh --version

      - name: Run molecule test
        if: steps.filter.outputs.run_molecule != 'false'
        run: retry -t 1 -d 60 make test TEST_ARGS="-s ${{ matrix.host }}"

      ################
      # Artifacts
      ################
      - name: Find logs
        if: steps.filter.outputs.run_molecule != 'false'
        run: find . -iname 'ansible.log'

      - name: Clean up molecule resources
        if: always() && steps.filter.outputs.run_molecule != 'false'
        run: molecule destroy -s "${{ matrix.host }}"

      - name: Upload ansible logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always() && steps.filter.outputs.run_molecule != 'false'
        with:
          name: ansible-${{ matrix.host }}.log
          path: config/tmp/ansible.log

