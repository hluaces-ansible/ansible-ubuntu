---
name: Test
run-name: Test for ${{ github.event_name }}:${{ github.ref }} (${{ github.sha }})
"on":
  pull_request:
  push:
    branches: main
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Test:
    runs-on: self-hosted
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        host:
          - "ubuntu24-laptop"
          - "ubuntu24-desktop"
          - "sysctl"
          - "dotfiles"
          - "dropbox"
          - "ulauncher"
    steps:
      - name: Check whether molecule-relevant files changed
        id: filter
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            url="https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100"
            jq_expr='.[].filename'
          elif [ "${PUSH_BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            # Branch-creation push has no comparable range: run everything.
            echo "run_molecule=true" >> "${GITHUB_OUTPUT}"
            exit 0
          else
            url="https://api.github.com/repos/${REPO}/compare/${PUSH_BEFORE}...${PUSH_AFTER}"
            jq_expr='.files[].filename'
          fi

          files=$(curl -sf --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${url}" | jq -r "${jq_expr}")

          relevant=$(printf '%s\n' "${files}" \
            | grep -vE '^(\.github/|README\.md$|renovate\.json$|LICENSE$|\.gitignore$)' \
            || true)

          # A 100-file page means the list may be truncated: run to be safe.
          if [ -z "${relevant}" ] && [ "$(printf '%s\n' "${files}" | wc -l)" -lt 100 ]; then
            echo "Only molecule-irrelevant files changed, skipping test steps"
            echo "run_molecule=false" >> "${GITHUB_OUTPUT}"
          else
            echo "run_molecule=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check out code
        if: steps.filter.outputs.run_molecule != 'false'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      ################
      # Bootstrapping
      ################
      - name: Init variables
        if: steps.filter.outputs.run_molecule != 'false'
        run: |
          # Ephemeral storage
          MOLECULE_EPHEMERAL_DIRECTORY="${GITHUB_WORKSPACE}/.molecule_ephemeral/${{ matrix.host }}"
          echo "MOLECULE_EPHEMERAL_DIRECTORY=${MOLECULE_EPHEMERAL_DIRECTORY}" >> "${GITHUB_ENV}"
          mkdir -p "${MOLECULE_EPHEMERAL_DIRECTORY}"

          DEFAULT_VAULT_PASSWORD_FILE="${MOLECULE_EPHEMERAL_DIRECTORY}/.default.vault"
          echo "DEFAULT_VAULT_PASSWORD_FILE=${DEFAULT_VAULT_PASSWORD_FILE}" >> "${GITHUB_ENV}"

          # Runner slot drives the libvirt namespace; an unparseable name must fail
          # loudly, not fall back to a shared default slot.
          if [[ "${RUNNER_NAME}" =~ ^runner-([0-9]+)- ]]; then
            echo "MOLECULE_RUNNER_SLOT=${BASH_REMATCH[1]}" >> "${GITHUB_ENV}"
          else
            echo "::error::Cannot derive runner slot from RUNNER_NAME='${RUNNER_NAME}'"
            exit 1
          fi

      - name: Enable APT cache proxy when available
        if: steps.filter.outputs.run_molecule != 'false'
        run: |
          # VMs reach the same daemon via their libvirt gateway IP.
          if curl -sf --max-time 3 http://localhost:3142/acng-report.html > /dev/null; then
            echo "MOLECULE_APT_PROXY=1" >> "${GITHUB_ENV}"
            echo "apt-cacher-ng detected, enabling VM apt proxy"
          else
            echo "apt-cacher-ng not reachable, VMs will download directly"
          fi

      - name: Bootstrap environment
        if: steps.filter.outputs.run_molecule != 'false'
        uses: ./.github/actions/bootstrap
        with:
          vault-password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          vault-file: ${{ env.DEFAULT_VAULT_PASSWORD_FILE }}

      - name: Set up Ansible homedir and show tools versions
        if: steps.filter.outputs.run_molecule != 'false'
        run: ansible --version && virsh --version

      - name: Run molecule test
        if: steps.filter.outputs.run_molecule != 'false'
        run: make test TEST_ARGS="-s ${{ matrix.host }}"

      ################
      # Artifacts
      ################
      - name: Clean up molecule resources
        if: always() && steps.filter.outputs.run_molecule != 'false'
        run: molecule destroy -s "${{ matrix.host }}"

      - name: Upload ansible logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always() && steps.filter.outputs.run_molecule != 'false'
        with:
          name: ansible-${{ matrix.host }}.log
          path: config/tmp/ansible.log
          retention-days: 14
          if-no-files-found: error

